name: Publish SDKs

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Package Java SDK
        run: |
          cd sdk/java
          mvn -B -DskipTests package

  publish-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Check Android SDK layout
        run: |
          test -d sdk/android

  publish-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip build twine
      - name: Build Python SDK
        run: |
          cd sdk/python
          python -m build

  publish-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Package Rust SDK
        run: |
          cd sdk/rust
          cargo package

  publish-nodejs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Package Node.js SDK
        run: |
          cd sdk/nodejs
          npm pack --ignore-scripts
